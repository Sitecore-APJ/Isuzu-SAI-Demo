      Hint: Content
      Value: |
        <div class="ck-content"><p>03 April 2024</p><p>As the longstanding national partnership between Isuzu UTE Australia (IUA) and Surf Life Saving Australia (SLSA) concludes its third year, Isuzu UTE Australia reaffirms its commitment to beach safety by extending their support for an additional three years.<br /><br /><img src="https://cdn-iua.dataweavers.io/-/media/discover/news/2024/slsa-partnership-renewal-2024/slsa-renewal-2024_internal-image-1.jpg?rev=6661c36b98f54d948af2cb155eb84ddd" width="686" height="377" /></p><p>Since joining forces in 2021, IUA has been a crucial ally in SLSA's mission to safeguard Australian beaches and their visitors, through providing significant annual contributions in addition to a fleet of ‘rescue-ready’ vehicles.</p><p>"Three years into our partnership, Surf Life Saving Australia's legacy of 117 years, continues to inspire us. We are honoured to extend our support for an additional three years, recognising the profound impact they've had on the community and the ongoing commitment to their vital mission," said Isuzu UTE Australia Managing Director, Junta Matsui.</p><p>"Embedded in the heart of local communities, the essence of SLSA lies in safeguarding Australian beaches and the people who frequent them. Isuzu UTE Australia is extremely proud to continue to support SLSA and the courageous individuals dedicated to beach safety through their patrols, training initiatives, and educational endeavours."</p><p>"We recognise the importance of providing SLSA with reliable and durable vehicles that can withstand the rigors of beach patrols," Matsui added. "The Isuzu D-MAX Ute and MU-X SUV have proven to be invaluable assets, and we are proud to continue supporting SLSA with these vehicles."</p></div>
