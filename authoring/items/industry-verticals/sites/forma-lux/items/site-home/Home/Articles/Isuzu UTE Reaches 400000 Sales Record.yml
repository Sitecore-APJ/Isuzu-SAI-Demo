    - ID: "56a52337-177b-46b4-ae72-6b9083bb6700"
      Hint: Content
      Value: |
        <div class="ck-content"><p>For the past 17 years, IUA has forged a reputation for capability, durability, and value for money, proactively fostering local feedback to evolve to the demands of arguably the world’s most competitive automotive market. “This incredible new milestone of 400,000 deliveries is testament, yet again, to the depth of trust in our brand among Australian consumers,” says IUA Managing Director, Mr Junta Matsui. “It’s a continuation of Isuzu UTE’s surge through the ranks of Australia’s best-selling automotive brands – one which has seen us finish in the Top 10 for vehicle sales every year since 2023.”</p><p>“This landmark result is deeply humbling, and a reflection of our commitment to helping Australians to make the most of this incredible country, whether they’re at work or going their own way on the weekend. We are grateful to every single customer that has chosen a D-MAX or MU-X over the last 17 years, as well as to our entire Isuzu UTE family. From the 19 dealers that have been with us from the start, to our ever-growing Australia-wide Dealer Network, your loyalty, professionalism, and commitment is the foundation of our success.”</p><p>With current strong sales momentum, including 2025 YTD sales driven by the introduction of the face-lifted MU-X in March, and the all-new 2.2L, eight-speed models in October, IUA is proud to remain the largest global export market for D-MAX and MU-X. It now sets its sights on a bold new challenge: half a million Australian deliveries.</p><p>IUA’s accomplishments have significantly contributed to Isuzu’s worldwide success, with Isuzu Motors International Operations (Thailand) Co.,Ltd., the global export hub for Isuzu’s Light Commercial Vehicles, celebrating the major global achievement of shipping its 3 millionth Light Commercial Vehicle – including all of Australia’s D-MAX and MU-X deliveries – in August 2025.<br /><br />Fittingly, that 3 millionth vehicle was also prepared for international shipment – it being yet another IUA vehicle destined for Australia. To learn more about the Isuzu range, visit the D-MAX and MU-X pages.</p></div>
