    - ID: "62c99938-d40e-4878-ab77-3464abd79fd5"
      Hint: ShortDescription
      Value: "Isuzu UTE Australia (IUA) recorded a major Australian milestone in December with its 400,000th local vehicle delivery – another sign of the enduring popularity of the Japanese marque’s two-model lineup. Over 280,000 D-MAX utes and close to 120,000 seven-seat MU-X SUVs have found their way into Australian driveways since 2008, with more than 50,000 sales in just the past 14 months alone."
